services:
  topo-postgres:
    image: postgres:16
    container_name: topo-postgres
    restart: unless-stopped

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-topo}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    volumes:
      - topo-postgres-data:/var/lib/postgresql/data

    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-16MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-1GB}"
      - "-c"
      - "log_min_duration_statement=500"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  topo-postgres-data:
